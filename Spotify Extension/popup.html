<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Spotify Quick Play CLI Extension</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 320px;
        padding: 20px;
        font-family: 'Segoe UI', sans-serif;
        background-color: #121212;
        color: white;
      }

      h2 {
        color: #1DB954;
        margin-bottom: 16px;
        font-size: 18px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      input {
        width: 100%;
        padding: 10px 14px;
        border-radius: 20px;
        border: none;
        background: #282828;
        color: white;
        font-size: 14px;
        outline: none;
        margin-bottom: 12px;
      }

      input::placeholder {
        color: #aaa;
      }

      input:focus {
        border: 1px solid #1DB954;
      }

      button {
        width: 100%;
        padding: 10px;
        background-color: #1DB954;
        color: black;
        font-weight: bold;
        font-size: 14px;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        transition: background 0.2s;
      }

      button:hover {
        background-color: #1ed760;
      }

      #status {
        margin-top: 12px;
        font-size: 12px;
        color: #aaa;
        text-align: center;
      }
    </style>
  </head>
  <body>

    <h2>🎵 Spotify Launcher</h2>

    <input
      type="text"
      id="songInput"
      placeholder="e.g. Bohemian Rhapsody Queen"
      autofocus
    />

    <button id="playBtn">Open in Spotify</button>

    <p id="status"></p>

    <script src="popup.js"></script>
  </body>
</html>
